name: ShopKart Allure Report

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  allure-report:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: shopkart
          MYSQL_USER: shopkart_user
          MYSQL_PASSWORD: root
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run DB‑only tests
        run: ./gradlew clean test -Dcucumber.filter.tags="@db" || true
        env:
          SHOPKART_DB_URL: jdbc:mysql://localhost:3306/shopkart
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: shopkart
          DB_USER: shopkart_user
          DB_PASSWORD: root

      - name: Copy Allure environment
        if: always()
        run: |
          mkdir -p build/allure-results
          echo "JAVA_VERSION=21" >> build/allure-results/environment.properties
          echo "DB=MySQL 8.4" >> build/allure-results/environment.properties

      - name: Create gh-pages branch if it does not exist
        if: always()
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf . || true
            echo "# GitHub Pages" > README.md
            git add README.md
            git -c user.name="github-actions" \
                -c user.email="github-actions@github.com" \
                commit -m "Initialize gh-pages"
            git push origin gh-pages
          fi
          git checkout ${{ github.ref_name }}

      - name: Checkout gh-pages
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: build/allure-results
          allure_report: allure-report

      - name: Publish report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

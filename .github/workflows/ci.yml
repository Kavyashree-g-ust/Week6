name: ShopKart CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: shopkart
          MYSQL_USER: shopkart_user
          MYSQL_PASSWORD: 123456789
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
      shopkart:
        image: ghcr.io/ust-sdet/shopkart:stable
        ports:
          - 8080:8080

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests
        env:
          SHOPKART_DB_URL: jdbc:mysql://localhost:3306/shopkart
          SHOPKART_DB_USER: shopkart_user
          SHOPKART_DB_PASSWORD: 123456789
          SELENIDE_HEADLESS: true
        run: ./gradlew clean test

      - name: Generate Allure Report
        run: ./gradlew allureReport

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reports
          path: |
            build/reports/tests/test
            build/test-results/test
            build/reports/allure-report
